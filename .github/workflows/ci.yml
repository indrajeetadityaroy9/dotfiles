name: ci

on: [push, pull_request]

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        # Real target arches: arm64 mac + aarch64 linux (ubuntu-24.04-arm is free on public repos).
        os: [macos-14, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false   # don't install repo tools yet — we render the config into a temp HOME first

      # Render the dotfiles into a throwaway HOME so we prove the templates resolve on THIS arch,
      # then install the locked toolchain the rendered config points at.
      # NOTE: exact HOME / mise wiring may need a tweak on first run (see plan §6).
      - name: Render + install locked toolchain
        run: |
          set -eux
          export HOME="$RUNNER_TEMP/home"; mkdir -p "$HOME"
          mise use -g chezmoi
          chezmoi apply --source "$GITHUB_WORKSPACE" --destination "$HOME"
          mise install          # validates mise.lock resolves for this platform

      - name: Secret scan (gitleaks, full tree)
        run: |
          export HOME="$RUNNER_TEMP/home"
          mise exec gitleaks -- gitleaks dir --no-banner -v "$GITHUB_WORKSPACE"

      - name: Lint shell scripts (shellcheck)
        run: |
          export HOME="$RUNNER_TEMP/home"
          mise exec shellcheck -- shellcheck "$GITHUB_WORKSPACE/bootstrap.sh" "$GITHUB_WORKSPACE"/run_once_after_install-*.sh

      - name: Run pre-commit hooks (prek)
        run: |
          export HOME="$RUNNER_TEMP/home"
          cd "$GITHUB_WORKSPACE"
          mise exec -- prek run --all-files
