name: ci

# Slim public-repo backstop: secret scan + shell lint only.
# No dotfiles apply / no mise install — reproducibility is proven by the real machines;
# this just catches a leaked secret or a broken script on a commit that skipped the local hooks.

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          install: false

      - name: Secret scan (gitleaks, full tree)
        run: mise exec gitleaks@latest -- gitleaks dir --no-banner -v .

      - name: Lint shell scripts (shellcheck)
        run: mise exec shellcheck@latest -- shellcheck bootstrap.sh run_once_after_install-*.sh
